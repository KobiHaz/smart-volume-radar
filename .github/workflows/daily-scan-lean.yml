name: Lean Radar - Daily Scan

# Runs on the `stable` branch only — sends a stripped-down 3-signal report
# (consolidation breakout / RVOL 3x+ / healthy pullback) to the same Telegram
# chat as the experimental Radar (main). Goal: A/B comparison over 30 days.

concurrency:
  group: daily-scan-lean
  cancel-in-progress: false

on:
  schedule:
    # 20:15 UTC, Mon–Fri — same window as the experimental main scan.
    - cron: '15 20 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    # NOTE: GitHub Actions only triggers scheduled workflows from the DEFAULT
    # branch (main), so we cannot gate on `github.ref == 'refs/heads/stable'`
    # — that gate skipped every scheduled run (which is exactly what was
    # happening 2026-05-08 → 2026-05-11). The job explicitly checks out
    # `stable` below, so the source code is always correct regardless of
    # which branch fired the trigger.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read  # required by dawidd6/action-download-artifact for prior-run lookup
    # Hoist Cloudflare secrets to job-level env so step `if:` can gate on them.
    # (The `secrets` context is NOT available in step `if:`, but job `env` IS.)
    # This keeps the job green until the secrets are configured.
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

    steps:
      - name: Checkout stable branch
        uses: actions/checkout@v6
        with:
          ref: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Download yesterday's lean snapshot so the 🎓 Graduated detector can
      # find tickers that were in the Silent Watchlist yesterday and fired
      # a real signal today. Empirically the highest-quality cohort per
      # 2026-05-13 conversion analysis (SNDK +1326%, MXL +484%, LITE +722%
      # all came through the near→real path).
      #
      # Picks the most recent SUCCESSFUL previous run of this workflow and
      # extracts its artifact directly into results/. Each daily artifact
      # contains the full results/ dir from that run (lean-YYYY-MM-DD.json),
      # so multiple successive runs accumulate snapshots — graduates.ts
      # walks back up to 7 days to skip weekends/holidays.
      #
      # If no prior artifact exists (first run, all-runs pruned, etc.)
      # the step warns and the Graduated section degrades to empty.
      - name: Download previous Lean Radar snapshot
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: daily-scan-lean.yml
          workflow_conclusion: success
          path: results/
          if_no_artifact_found: warn
          # Skip artifacts from THIS run's own workflow_dispatch invocations
          # if we're in a re-run (avoid downloading our own pending upload).
          allow_forks: false

      # dawidd6/action-download-artifact extracts each artifact into a
      # subfolder named after the artifact (results/lean-radar-12/lean-...).
      # graduates.ts looks for files directly under results/, so flatten:
      # move any lean-*.json from those subfolders up one level. Idempotent.
      - name: Flatten downloaded snapshots
        if: always()
        run: |
          set -e
          if compgen -G "results/lean-radar-*/lean-*.json" > /dev/null; then
            for f in results/lean-radar-*/lean-*.json; do
              mv -f "$f" results/
            done
            rm -rf results/lean-radar-*
            echo "✓ flattened lean snapshots into results/"
          else
            echo "(no prior lean-radar-*/ subfolders to flatten)"
          fi
          echo ""
          echo "lean snapshots now present:"
          ls results/lean-*.json 2>/dev/null || echo "(none yet — first run or no prior artifact)"

      - name: Run Lean Radar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          # Force scan because Sundays-Fridays may be holidays / weekends in TASE.
          FORCE_SCAN: 'true'
        run: npm run start:lean

      # Ingest today's dashboard rows into Cloudflare D1. CF_* come from the
      # job-level env; the `if:` gate keeps this green until the secrets exist.
      - name: Ingest dashboard rows to D1
        if: success() && env.CF_API_TOKEN != ''
        run: |
          cd dashboard && npm ci
          npx tsx scripts/seed.ts ../results

      - name: Telegram dashboard pointer
        if: success() && env.CF_API_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(ls results/dashboard-*.json | sort | tail -1 | sed 's/.*dashboard-//;s/.json//')
          HI=$(jq '[.[]|select(.score>=70)]|length' "results/dashboard-${DATE}.json")
          TOT=$(jq 'length' "results/dashboard-${DATE}.json")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🪶 Lean ${DATE}: ${HI} בשכנוע גבוה · ${TOT} סיגנלים → https://lean-dashboard-cfg.pages.dev"

      # Persist the full per-run snapshot (lean-{date}.json + raw scan files)
      # as a year-retained artifact for retrospective debugging.
      - name: Upload Lean Radar artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: lean-radar-${{ github.run_number }}
          path: results/
          retention-days: 365
          if-no-files-found: warn

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=⚠️ 🪶 Lean Radar failed. Check GitHub Actions on stable branch."
          fi
