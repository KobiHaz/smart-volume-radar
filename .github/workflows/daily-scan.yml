name: Smart Volume Radar - Daily Scan

concurrency:
  group: daily-scan
  cancel-in-progress: false

on:
  schedule:
    # Run at 20:15 UTC, Mon–Fri.
    # In EDT (summer): 20:15 UTC = 16:15 ET = 15 min after market close (16:00 ET) ✓
    # In EST (winter): 20:15 UTC = 15:15 ET = 45 min BEFORE close (16:00 ET) ⚠
    # → in winter, today's data may be incomplete. Revisit when DST ends (early Nov).
    - cron: '15 20 * * 1-5'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed to commit .jules-last-issues.json for dedup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      # Refresh the universe sheet from the friend's shared TradingView watchlists
      # before the scan reads it. Self-guards: if the secrets aren't configured yet,
      # it skips cleanly and the scan proceeds with the existing sheet.
      - name: Sync friend watchlists → universe sheet
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          WATCHLIST_SOURCES_JSON: ${{ secrets.WATCHLIST_SOURCES_JSON }}
        run: |
          if [ -z "$WATCHLIST_SOURCES_JSON" ] || [ -z "$GOOGLE_SHEETS_CREDENTIALS_JSON" ]; then
            echo "Friend-watchlist sync not configured (missing secrets) — skipping."
            exit 0
          fi
          printf '%s' "$WATCHLIST_SOURCES_JSON" > watchlist-sources.json
          npm run sync-friend-watchlists

      - name: Run Smart Volume Radar
        id: scan
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # Smart's daily report goes to the "Alpha Engine" Telegram group
          # (NOT the Lean-only daily channel). Same bot (@RonMarketBot) — it's a
          # member of that group. The Engine's own curated report still posts
          # there separately via local launchd; this is an additional message.
          # Lean continues to own secrets.TELEGRAM_CHAT_ID untouched.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_ENGINE_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          # Groq is used only for ticker classification (STOCK/INDEX/ETF/BOND/OTHER)
          # via classifyTickersWithGroq. The daily LLM commentary feature was
          # removed 2026-05-22 — see decisions-log.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MIN_RVOL: '2.0'
          FORCE_SCAN: 'true'
          # Dashboard integration: push the day's Setup signals + RS to the
          # radar-dashboard D1 (Account B — same secrets the lean scan uses).
          # Missing secrets → the ingest silently skips; it never fails the scan.
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: npm run start

      - name: Set artifact name
        id: artifact
        run: |
          SCAN_FILE=$(ls results/scan-20*.json 2>/dev/null | head -1)
          DATE=$(basename "$SCAN_FILE" .json 2>/dev/null | sed 's/scan-//')
          echo "name=scan-${DATE:-$(date -u +%Y-%m-%d)}" >> $GITHUB_OUTPUT

      - name: Upload scan results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: results/
          retention-days: 365

      # Persist the monitor-list.json across runs so the follow-up state survives.
      # Artifacts aren't loaded back automatically; committing to the repo is the
      # simplest way to keep state continuous and visible in git history.
      - name: Commit-back monitor-list.json
        if: success() && hashFiles('results/monitor-list.json') != ''
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/monitor-list.json
          if git diff --staged --quiet; then
            echo "No monitor-list.json changes to commit"
          else
            git commit -m "chore: update monitor-list.json (daily scan ${{ steps.artifact.outputs.name }})"
            # Pull latest before push to avoid conflicts with concurrent runs.
            git pull --rebase origin main || true
            git push origin HEAD:main || echo "Push failed — will retry next run"
          fi

      - name: Report success
        if: success() && !hashFiles('.scan-issues.json')
        run: echo "✅ Smart Volume Radar completed successfully"

      - name: Get run issues for Jules
        if: success() && hashFiles('.scan-issues.json') != ''
        id: issues
        run: |
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64 | tr -dc 'a-zA-Z0-9')
          echo "content<<${DELIMITER}" >> $GITHUB_OUTPUT
          cat .scan-issues.json >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Notify Telegram (Jules invoked for run issues)
        if: success() && hashFiles('.scan-issues.json') != ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Smart's ops notices go to the Alpha Engine group (same target as its
          # daily report). Lean's channel (secrets.TELEGRAM_CHAT_ID) is untouched.
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_ENGINE_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="🔧 Run issues detected (invalid tickers / fetch failures). Jules invoked to fix. Check GitHub Actions."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          fi

      - name: Invoke Jules to fix run issues
        if: success() && hashFiles('.scan-issues.json') != ''
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            The Smart Volume Radar daily scan completed successfully but reported RUN ISSUES.

            **Run issues (.scan-issues.json):**
            ```
            ${{ steps.issues.outputs.content }}
            ```

            Issues include:
            - **Invalid ticker format (skipped):** Symbols that don't match TICKER_REGEX in src/config/index.ts (e.g. 000660.KS, 8035.T, BA.L). Either extend the regex to support them or recommend removing from the Google Sheet.
            - **Failed to fetch:** Tickers that returned no data from Yahoo/Twelve Data. May need fallback logic or documentation.

            Please:
            1. Analyze the issues from the JSON above
            2. Implement a minimal fix (extend ticker validation if appropriate, or improve fetch handling)
            3. Run npm run lint, npm run build, npm run test
            4. Run npm version patch -m "fix: resolve run issues (invalid tickers / fetch failures)"
            5. Push to branch fix/daily-scan-run-issues-${{ github.run_number }} and open a PR to main

            Project context:
            - Entry: src/index.ts | Config: src/config/ | Ticker validation: validateTicker, TICKER_REGEX
            - Standards: docs/standards-for-ci.md
            - PR body: Include summary — what changed, why, how to verify.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_last_commit: true
          include_commit_log: true

      - name: Persist Jules issues for dedup (one fix attempt)
        if: success() && hashFiles('.scan-issues.json') != '' && hashFiles('.jules-last-issues.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .jules-last-issues.json
          git diff --staged --quiet || git commit -m "chore: persist Jules issues for dedup"
          git push || echo "Push skipped (may already be up to date)"
      
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Failure notice goes to the Alpha Engine group (same target as Smart's
          # daily report). Lean's channel (secrets.TELEGRAM_CHAT_ID) is untouched.
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_ENGINE_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=❌ Smart Volume Radar failed. Jules will attempt an auto-fix. Check GitHub Actions."
          else
            echo "⚠️ Telegram secrets not set, skipping notification"
          fi
