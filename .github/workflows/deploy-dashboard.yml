name: Deploy Dashboard (Pages)

# Manual deploy of the radar dashboard (static frontend + Pages Functions)
# to Cloudflare Pages on Account B. Uses the same CF_* secrets as the lean
# scan's D1 ingest. Trigger from the Actions tab or `gh workflow run`.
#
# --branch=production is REQUIRED (2026-07-09 fix): radar-dashboard is a
# Direct-Upload Pages project (no Git integration), and its canonical/
# production branch is the literal string "production" — not tied to any
# git branch. Without this flag, wrangler auto-detects the actual git
# branch checked out here (e.g. "stable") and every deploy lands as a
# PREVIEW (stable.radar-dashboard-c9o.pages.dev), silently never touching
# the real https://radar-dashboard-c9o.pages.dev/ that the user visits.
# Verified via the Cloudflare API: canonical_deployment.created_on matched
# the deploy timestamp only once this flag was added.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx wrangler pages deploy public --project-name radar-dashboard --commit-dirty=true --branch=production
