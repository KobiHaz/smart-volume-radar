# Triggers when the daily scan fails. Invokes Jules to analyze, fix, version bump, and open a PR.
# After merge, re-run-scan-after-fix.yml will trigger the daily scan again.

name: Jules Fix on Daily Scan Failure

on:
  workflow_run:
    workflows: ['Smart Volume Radar - Daily Scan']
    types: [completed]

jobs:
  fix-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Notify Telegram (Jules invoked)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="🔧 Jules invoked to fix daily scan failure. Track: ${{ github.event.workflow_run.html_url }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          fi

      - name: Invoke Jules to fix failure
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: |
            The Smart Volume Radar daily scan has failed in GitHub Actions.

            **Failed run:** ${{ github.event.workflow_run.html_url }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Repository:** ${{ github.repository }}

            Please:
            1. Analyze the failure from the workflow run logs (you have access to the run)
            2. Identify the root cause
            3. Implement a minimal fix
            4. Run `npm run lint`, `npm run build`, and `npm run test` to verify
            5. Run `npm version patch -m "fix: resolve daily scan failure"` to bump the version
            6. Push to branch `fix/daily-scan-${{ github.event.workflow_run.run_number }}` and open a PR to main

            Project context (Node.js, TypeScript, ESM):
            - Entry: src/index.ts
            - Config: src/config/, env vars, Google Sheet watchlist
            - Run: `npm run start`; needs FINNHUB_API_KEY, TELEGRAM_*, GOOGLE_SHEET_ID
            - Standards: src/utils/logger (no console.log), escapeHtml for Telegram HTML
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true
          include_commit_log: true
